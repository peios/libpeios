# cbindgen configuration for libpeios.
#
# ROLE: verification, not generation. The shipping API is the hand-written
# include/peios/*.h headers (with their prose docs); this config regenerates a
# doc-stripped ABI *snapshot* from the Rust `extern "C"` surface so that any drift
# between the Rust ABI and those headers is caught mechanically. The snapshot lives
# at abi/peios-abi.h and is checked by tools/verify-abi.sh. See abi/README.md.

language = "C"
header = "/* @generated by cbindgen from the Rust source — do not edit. */"
include_guard = "PEIOS_ABI_GENERATED_H"
cpp_compat = true
# Tag-style structs (`struct X`, no typedef) — matches the hand-written headers and
# lets a descriptor struct and a same-named function coexist (separate C namespaces,
# e.g. `struct peios_reg_enum_value` and `peios_reg_enum_value()`).
style = "tag"
documentation = false
# Render `usize`/`isize` as size_t/ptrdiff_t (matching the hand-written headers),
# not uintptr_t/intptr_t.
usize_is_size_t = true
# Deterministic ordering so the committed snapshot diffs cleanly on regeneration.
sort_by = "Name"

# The kernel-ABI types this surface references (kacs_*, kmes_*, reg_* structs and
# generic mappings) are defined in the <pkm/*.h> uapi headers, exactly as the
# hand-written headers include them; ssize_t comes from <sys/types.h>. cbindgen does
# not parse the peios-uapi crate, so it emits these types by name — make them
# resolvable by including their headers in the snapshot.
sys_includes = ["stdint.h", "stddef.h", "stdbool.h", "sys/types.h", "pkm/pkm.h", "pkm/kmes.h", "pkm/lcs.h"]
no_includes = true

[parse]
# Only libpeios itself defines the public surface; the uapi/libc types are external.
parse_deps = false

[export]
# Keep only our public ABI; the uapi types arrive via the includes above.
prefix = ""
# The crate imports libc abort for the panic handler; it is not a libpeios export.
exclude = ["abort"]

# The KACS uapi types we pass by value/pointer are tag-only `struct kacs_*` in the
# <pkm/*.h> headers; cbindgen sees them as opaque externals and would emit them bare.
# Spell them with the `struct` tag so the snapshot resolves against the real uapi.
[export.rename]
"kacs_generic_mapping" = "struct kacs_generic_mapping"
"kacs_group_entry" = "struct kacs_group_entry"
"kacs_node_result" = "struct kacs_node_result"
"kacs_object_type_entry" = "struct kacs_object_type_entry"
"kacs_priv_entry" = "struct kacs_priv_entry"
